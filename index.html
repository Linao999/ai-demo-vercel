<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Demo</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; color: #1e293b; }
.container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 4px; }
.subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 20px; }
.tabs { display: flex; gap: 4px; margin-bottom: 20px; background: #e2e8f0; border-radius: 10px; padding: 4px; }
.tab { flex: 1; text-align: center; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 0.95rem; border: none; background: transparent; color: #475569; transition: all .2s; }
.tab.active { background: #fff; color: #1e293b; font-weight: 600; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
.panel { display: none; }
.panel.active { display: flex; gap: 20px; }
.sidebar { width: 220px; flex-shrink: 0; }
.main { flex: 1; min-width: 0; }
.scene-btn { display: block; width: 100%; padding: 10px 14px; margin-bottom: 8px; border: 1px solid #e2e8f0; border-radius: 10px; background: #fff; cursor: pointer; text-align: left; font-size: 0.9rem; transition: all .15s; }
.scene-btn:hover { border-color: #6366f1; background: #eef2ff; }
.chat-area { background: #fff; border-radius: 14px; border: 1px solid #e2e8f0; padding: 16px; min-height: 420px; max-height: 520px; overflow-y: auto; margin-bottom: 12px; display: flex; flex-direction: column; gap: 12px; }
.chat-msg { padding: 10px 14px; border-radius: 12px; max-width: 85%; line-height: 1.6; font-size: 0.92rem; }
.chat-msg.user { align-self: flex-end; background: #6366f1; color: #fff; }
.chat-msg.assistant { align-self: flex-start; background: #f1f5f9; }
.chat-msg.assistant p { margin: 4px 0; }
.chat-msg.assistant blockquote { border-left: 3px solid #6366f1; padding-left: 10px; color: #475569; margin: 6px 0; font-size: 0.85rem; }
.chat-msg.assistant table { border-collapse: collapse; width: 100%; margin: 6px 0; font-size: 0.85rem; }
.chat-msg.assistant th, .chat-msg.assistant td { border: 1px solid #e2e8f0; padding: 6px 10px; text-align: left; }
.chat-msg.assistant th { background: #f1f5f9; }
.input-row { display: flex; gap: 8px; }
.input-row input { flex: 1; padding: 12px 16px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 0.95rem; outline: none; }
.input-row input:focus { border-color: #6366f1; }
.input-row button { padding: 12px 24px; background: #6366f1; color: #fff; border: none; border-radius: 12px; cursor: pointer; font-size: 0.95rem; font-weight: 500; }
.input-row button:hover { background: #4f46e5; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 0.85rem; color: #64748b; margin-bottom: 4px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 0.9rem; outline: none; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #6366f1; }
.btn-primary { width: 100%; padding: 12px; background: #6366f1; color: #fff; border: none; border-radius: 10px; font-size: 0.95rem; cursor: pointer; font-weight: 500; margin-bottom: 16px; }
.btn-primary:hover { background: #4f46e5; }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
.result-area { background: #fff; border-radius: 14px; border: 1px solid #e2e8f0; padding: 20px; min-height: 300px; line-height: 1.7; }
.result-area h2 { font-size: 1.1rem; margin: 12px 0 6px; }
.result-area h3 { font-size: 1rem; margin: 10px 0 4px; }
.result-area table { border-collapse: collapse; width: 100%; margin: 8px 0; }
.result-area th, .result-area td { border: 1px solid #e2e8f0; padding: 6px 10px; text-align: left; font-size: 0.9rem; }
.result-area th { background: #f1f5f9; }
.result-area ul, .result-area ol { padding-left: 20px; margin: 6px 0; }
.empty { color: #94a3b8; text-align: center; padding: 60px 20px; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #e2e8f0; border-top-color: #6366f1; border-radius: 50%; animation: spin .6s linear infinite; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.clear-btn { background: none; border: 1px solid #e2e8f0; border-radius: 8px; padding: 6px 14px; font-size: 0.8rem; cursor: pointer; color: #64748b; margin-top: 8px; }
.clear-btn:hover { background: #fee2e2; border-color: #fca5a5; color: #dc2626; }
</style>
</head>
<body>
<div class="container">
    <h1>智能客服</h1>
    <p class="subtitle">点击场景按钮快速体验，或直接输入问题</p>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('cs')">智能客服</button>
        <button class="tab" onclick="switchTab('travel')">智能旅游规划</button>
    </div>

    <!-- Tab 1: 智能客服 -->
    <div id="panel-cs" class="panel active">
        <div class="sidebar">
            <button class="scene-btn" onclick="csScene('📦 退换货咨询','我上周买的蓝牙耳机左耳没声音了，能退吗？')">📦 退换货咨询</button>
            <button class="scene-btn" onclick="csScene('🔍 订单查询','帮我查一下订单号 DD20260708001 到哪了')">🔍 订单查询</button>
            <button class="scene-btn" onclick="csScene('😤 投诉处理','快递员态度太差了！把我包裹扔门口就走了，也不打电话！')">😤 投诉处理</button>
            <button class="scene-btn" onclick="csScene('💡 产品咨询','我想买个投影仪，5000以内，主要在家看电影用，有什么推荐？')">💡 产品咨询</button>
        </div>
        <div class="main">
            <div class="chat-area" id="chatArea">
                <div class="chat-msg assistant">你好！我是智选商城智能客服小智 👋 有什么可以帮您的？</div>
            </div>
            <div class="input-row">
                <input id="csInput" placeholder="输入您的问题..." onkeydown="if(event.key==='Enter')csSend()">
                <button onclick="csSend()">发送</button>
            </div>
            <button class="clear-btn" onclick="csClear()">🗑️ 清空对话</button>
        </div>
    </div>

    <!-- Tab 2: 智能旅游规划 -->
    <div id="panel-travel" class="panel">
        <div class="sidebar">
            <div class="form-group"><label>📍 目的地</label><input id="tvDest" value="三亚"></div>
            <div class="form-group"><label>📅 天数</label><input id="tvDays" type="number" value="4" min="1" max="15"></div>
            <div class="form-group"><label>💰 预算（元/人）</label><input id="tvBudget" type="number" value="5000" min="500" step="500"></div>
            <div class="form-group">
                <label>🎯 旅行风格</label>
                <select id="tvStyle">
                    <option>休闲度假</option><option>自然风光</option><option>人文历史</option><option>美食探索</option>
                    <option>户外冒险</option><option>都市购物</option><option>亲子游</option><option>蜜月浪漫</option>
                </select>
            </div>
            <div class="form-group"><label>📝 补充要求</label><textarea id="tvAdd" rows="2" placeholder="素食、无障碍设施..."></textarea></div>
            <button class="btn-primary" onclick="travelPlan()" id="planBtn">🚀 生成旅行规划</button>
            <button class="scene-btn" onclick="travelScene('三亚',4,5000,'休闲度假')">🏖️ 三亚四天三晚</button>
            <button class="scene-btn" onclick="travelScene('云南（昆明-大理-丽江）',7,6000,'自然风光+人文')">🏔️ 云南七日深度游</button>
            <button class="scene-btn" onclick="travelScene('上海',2,2000,'都市探索+美食')">🏙️ 上海周末两日游</button>
        </div>
        <div class="main">
            <div class="result-area" id="travelResult"><div class="empty">👈 填写参数后点击「生成旅行规划」，或点击快捷场景一键填充</div></div>
        </div>
    </div>
</div>

<script>
marked.setOptions({ breaks: true });

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (tab==='cs'?0:1)===i));
    document.getElementById('panel-cs').classList.toggle('active', tab==='cs');
    document.getElementById('panel-travel').classList.toggle('active', tab==='travel');
    document.querySelector('h1').textContent = tab==='cs' ? '智能客服' : '智能旅游规划';
    document.querySelector('.subtitle').textContent = tab==='cs' ? '点击场景按钮快速体验，或直接输入问题' : '填写参数，生成个性化旅行方案';
}

const CS_SYSTEM = "你是智选商城智能客服「小智」。回复末尾附带AI处理过程：知识库命中、意图识别(置信度%)、情绪分析。退换政策：7天无理由、15天换新、30天保修。回复简洁专业。";

async function callAPI(messages, temp=0.7, maxTok=2048) {
    try {
        const resp = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages, temperature: temp, max_tokens: maxTok })
        });
        const data = await resp.json();
        return data.content || '服务暂时不可用';
    } catch(e) {
        return '网络错误，请稍后重试';
    }
}

// ====== 智能客服 ======
let csHistory = [];

function csScene(title, msg) {
    document.getElementById('csInput').value = msg;
    csSend();
}

async function csSend() {
    const input = document.getElementById('csInput');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    appendMsg('user', msg);
    csHistory.push({ role: 'user', content: msg });

    const msgs = [{ role: 'system', content: CS_SYSTEM }, ...csHistory];
    appendMsg('assistant', '<span class="spinner"></span>思考中...');
    const reply = await callAPI(msgs);
    // remove spinner
    const chat = document.getElementById('chatArea');
    chat.removeChild(chat.lastChild);
    appendMsg('assistant', marked.parse(reply));
    csHistory.push({ role: 'assistant', content: reply });
}

function appendMsg(role, html) {
    const chat = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'chat-msg ' + role;
    div.innerHTML = html;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function csClear() {
    csHistory = [];
    document.getElementById('chatArea').innerHTML = '<div class="chat-msg assistant">你好！我是智选商城智能客服小智 👋 有什么可以帮您的？</div>';
}

// ====== 智能旅游规划 ======
function travelScene(dest, days, budget, style) {
    document.getElementById('tvDest').value = dest;
    document.getElementById('tvDays').value = days;
    document.getElementById('tvBudget').value = budget;
    document.getElementById('tvStyle').value = style;
    travelPlan();
}

async function travelPlan() {
    const dest = document.getElementById('tvDest').value;
    const days = document.getElementById('tvDays').value;
    const budget = document.getElementById('tvBudget').value;
    const style = document.getElementById('tvStyle').value;
    const add = document.getElementById('tvAdd').value;
    if (!dest.trim()) return;

    const result = document.getElementById('travelResult');
    result.innerHTML = '<div class="empty"><span class="spinner"></span> 正在规划中...</div>';
    document.getElementById('planBtn').disabled = true;

    const prompt = `请为我规划一趟旅行：\n\n📍 目的地：${dest}\n📅 天数：${days}天\n💰 预算：${budget}元/人\n🎯 风格：${style}\n📝 补充：${add || '无'}\n\n请按以下 Markdown 格式输出：\n## 🗺️ 旅行概览\n## 📋 每日行程\n## 💰 预算明细（表格）\n## 💡 实用贴士\n## ⚠️ 注意事项`;

    const msgs = [
        { role: 'system', content: '你是资深旅行规划师，回复用Markdown格式，详细具体可执行。' },
        { role: 'user', content: prompt }
    ];
    const reply = await callAPI(msgs, 0.8, 3072);
    result.innerHTML = marked.parse(reply);
    document.getElementById('planBtn').disabled = false;
}
</script>
</body>
</html>
