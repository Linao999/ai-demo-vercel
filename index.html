<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --surface2: #fafafa;
    --border: #e8e8ed;
    --text: #1d1d1f;
    --text2: #6e6e73;
    --text3: #aeaeb2;
    --accent: #5e5ce6;
    --accent-hover: #4b49c7;
    --accent-light: #f0efff;
    --red: #ff3b30;
    --green: #34c759;
    --orange: #ff9500;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.04);
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
    --shadow-lg: 0 2px 8px rgba(0,0,0,.06), 0 8px 32px rgba(0,0,0,.06);
    --transition: .2s cubic-bezier(.4,0,.2,1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
}

/* Header */
.header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 48px;
    display: flex;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,.82);
}
.header h1 { font-size: .92rem; font-weight: 600; letter-spacing: -.01em; color: var(--text2); }

/* Tabs */
.tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    gap: 0;
}
.tab {
    padding: 14px 20px;
    border: none;
    background: none;
    cursor: pointer;
    font-size: .9rem;
    font-weight: 500;
    color: var(--text2);
    border-bottom: 2px solid transparent;
    transition: all var(--transition);
    font-family: inherit;
    letter-spacing: -.01em;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Layout */
.main-layout {
    max-width: 1200px;
    margin: 24px auto;
    padding: 0 24px;
    display: flex;
    gap: 24px;
    min-height: calc(100vh - 140px);
}

/* Sidebar */
.sidebar {
    width: 260px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.sidebar-label {
    font-size: .7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--text3);
    padding: 0 4px;
    margin-top: 4px;
}
.scene-card {
    display: block;
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    cursor: pointer;
    text-align: left;
    font-size: .88rem;
    color: var(--text);
    transition: all var(--transition);
    font-family: inherit;
    letter-spacing: -.01em;
}
.scene-card:hover {
    border-color: var(--accent);
    background: var(--accent-light);
    box-shadow: var(--shadow-sm);
}
.scene-card .emoji { font-size: 1.1rem; margin-right: 6px; }

/* Form in sidebar */
.form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
}
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group label {
    font-size: .78rem; font-weight: 600; color: var(--text2);
    letter-spacing: -.01em;
}
.form-group input, .form-group select, .form-group textarea {
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: .88rem;
    font-family: inherit;
    color: var(--text);
    background: var(--surface2);
    transition: all var(--transition);
    outline: none;
    resize: vertical;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(94,92,230,.1);
    background: #fff;
}
.btn {
    padding: 12px 20px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all var(--transition);
    letter-spacing: -.01em;
    display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary {
    background: var(--accent);
    color: #fff;
    width: 100%;
}
.btn-primary:hover { background: var(--accent-hover); box-shadow: 0 2px 12px rgba(94,92,230,.3); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.btn-ghost {
    background: none;
    color: var(--text2);
    padding: 8px 14px;
    font-size: .8rem;
    width: 100%;
    justify-content: center;
    border: 1px solid transparent;
}
.btn-ghost:hover { color: var(--red); background: #fff5f5; border-color: #fecaca; }

/* Content area */
.content {
    flex: 1;
    min-width: 0;
}

/* Chat */
.chat-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    height: calc(100vh - 200px);
    min-height: 500px;
    box-shadow: var(--shadow);
}
.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
}
.chat-messages::-webkit-scrollbar { width: 5px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

.chat-bubble {
    max-width: 78%;
    padding: 12px 18px;
    border-radius: 18px;
    font-size: .9rem;
    line-height: 1.6;
    animation: bubbleIn .25s ease-out;
    word-break: break-word;
}
@keyframes bubbleIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}
.chat-bubble.assistant {
    align-self: flex-start;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-bottom-left-radius: 6px;
}
.chat-bubble.user {
    align-self: flex-end;
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 6px;
}
.chat-bubble p { margin: 4px 0; }
.chat-bubble p:first-child { margin-top: 0; }
.chat-bubble p:last-child { margin-bottom: 0; }
.chat-bubble blockquote {
    border-left: 3px solid var(--accent);
    padding: 6px 12px;
    margin: 8px 0;
    font-size: .82rem;
    color: var(--text2);
    background: #fafaff;
    border-radius: 0 6px 6px 0;
}
.chat-bubble table {
    border-collapse: collapse; width: 100%; margin: 8px 0; font-size: .82rem;
}
.chat-bubble th, .chat-bubble td {
    border: 1px solid var(--border); padding: 7px 12px; text-align: left;
}
.chat-bubble th { background: var(--surface2); font-weight: 600; }
.chat-bubble.user blockquote { border-left-color: rgba(255,255,255,.5); background: rgba(255,255,255,.1); color: rgba(255,255,255,.9); }
.chat-bubble.user table { color: #fff; }
.chat-bubble.user th, .chat-bubble.user td { border-color: rgba(255,255,255,.2); }
.chat-bubble.user th { background: rgba(255,255,255,.15); }

/* Typing indicator */
.typing { display: flex; gap: 4px; padding: 4px 0; }
.typing span {
    width: 7px; height: 7px;
    background: var(--text3);
    border-radius: 50%;
    animation: typing 1.4s infinite;
}
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }
@keyframes blink {
    0%,100% { opacity: 1; }
    50% { opacity: 0; }
}
@keyframes typing {
    0%,60%,100% { opacity: .3; transform: scale(.85); }
    30% { opacity: 1; transform: scale(1); }
}

/* Chat input */
.chat-input-area {
    border-top: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    gap: 10px;
    background: var(--surface);
    border-radius: 0 0 var(--radius) var(--radius);
}
.chat-input-area input {
    flex: 1;
    padding: 12px 18px;
    border: 1px solid var(--border);
    border-radius: 24px;
    font-size: .9rem;
    font-family: inherit;
    outline: none;
    background: var(--surface2);
    transition: all var(--transition);
}
.chat-input-area input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(94,92,230,.1);
    background: #fff;
}
.chat-input-area button {
    padding: 12px 24px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 24px;
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: all var(--transition);
}
.chat-input-area button:hover { background: var(--accent-hover); }

/* Travel result */
.result-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 32px;
    min-height: 400px;
    box-shadow: var(--shadow);
    line-height: 1.8;
    font-size: .92rem;
}
.result-container h2 {
    font-size: 1.15rem;
    font-weight: 700;
    margin: 28px 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    letter-spacing: -.01em;
}
.result-container h2:first-child { margin-top: 0; }
.result-container h3 {
    font-size: 1rem;
    font-weight: 600;
    margin: 18px 0 8px;
    color: var(--accent);
}
.result-container table {
    border-collapse: collapse;
    width: 100%;
    margin: 12px 0;
    font-size: .88rem;
    border-radius: var(--radius-sm);
    overflow: hidden;
    border: 1px solid var(--border);
}
.result-container th, .result-container td {
    border: 1px solid var(--border);
    padding: 10px 16px;
    text-align: left;
}
.result-container th {
    background: var(--surface2);
    font-weight: 600;
    font-size: .82rem;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: .03em;
}
.result-container ul, .result-container ol { padding-left: 22px; margin: 8px 0; }
.result-container li { margin: 4px 0; }
.result-container strong { color: var(--text); }

/* Skeleton loading */
.skeleton {
    background: linear-gradient(90deg, var(--border) 25%, #f0f0f5 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.skeleton-line { height: 14px; margin-bottom: 10px; }
.skeleton-line.short { width: 60%; }
.skeleton-block { height: 80px; margin-bottom: 16px; }

/* Empty state */
.empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text3);
    text-align: center;
    gap: 12px;
    padding: 60px 20px;
}
.empty-state .icon { font-size: 3rem; opacity: .6; }
.empty-state p { font-size: .9rem; max-width: 280px; }

/* Responsive */
@media (max-width: 768px) {
    .main-layout { flex-direction: column; }
    .sidebar { width: 100%; }
    .tabs { overflow-x: auto; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
    <h1>Demo</h1>
</div>

<!-- Tabs -->
<div class="tabs">
    <button class="tab active" onclick="switchTab('cs')">智能客服</button>
    <button class="tab" onclick="switchTab('travel')">智能旅游规划</button>
</div>

<!-- Tab 1: 智能客服 -->
<div id="panel-cs" class="main-layout">
    <div class="sidebar">
        <div class="sidebar-label">快捷场景</div>
        <button class="scene-card" onclick="csScene('📦 退换货咨询','我上周买的蓝牙耳机左耳没声音了，能退吗？')"><span class="emoji">📦</span>退换货咨询</button>
        <button class="scene-card" onclick="csScene('🔍 订单查询','帮我查一下订单号 DD20260708001 到哪了')"><span class="emoji">🔍</span>订单查询</button>
        <button class="scene-card" onclick="csScene('😤 投诉处理','快递员态度太差了！把我包裹扔门口就走了，也不打电话！')"><span class="emoji">😤</span>投诉处理</button>
        <button class="scene-card" onclick="csScene('💡 产品咨询','我想买个投影仪，5000以内，主要在家看电影用，有什么推荐？')"><span class="emoji">💡</span>产品咨询</button>
    </div>
    <div class="content">
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="chat-bubble assistant">你好！我是智选商城智能客服小智 👋<br>有什么可以帮您的？</div>
            </div>
            <div class="chat-input-area">
                <input id="csInput" placeholder="输入您的问题…" onkeydown="if(event.key==='Enter')csSend()" autofocus>
                <button onclick="csSend()">发送</button>
            </div>
        </div>
        <button class="btn btn-ghost" onclick="csClear()" style="margin-top:12px">清除对话记录</button>
    </div>
</div>

<!-- Tab 2: 智能旅游规划 -->
<div id="panel-travel" class="main-layout" style="display:none">
    <div class="sidebar">
        <div class="sidebar-label">规划参数</div>
        <div class="form-card">
            <div class="form-group"><label>📍 目的地</label><input id="tvDest" value="三亚" placeholder="输入目的地"></div>
            <div class="form-group"><label>📅 天数</label><input id="tvDays" type="number" value="4" min="1" max="15"></div>
            <div class="form-group"><label>💰 预算（元/人）</label><input id="tvBudget" type="number" value="5000" min="500" step="500"></div>
            <div class="form-group">
                <label>🎯 旅行风格</label>
                <select id="tvStyle">
                    <option>休闲度假</option><option>自然风光</option><option>人文历史</option>
                    <option>美食探索</option><option>户外冒险</option><option>都市购物</option>
                    <option>亲子游</option><option>蜜月浪漫</option>
                </select>
            </div>
            <div class="form-group"><label>📝 补充要求</label><textarea id="tvAdd" rows="2" placeholder="如：素食、无障碍设施…"></textarea></div>
            <button class="btn btn-primary" onclick="travelPlan()" id="planBtn">🚀 生成旅行规划</button>
        </div>
        <div class="sidebar-label" style="margin-top:16px">快捷场景</div>
        <button class="scene-card" onclick="travelScene('三亚',4,5000,'休闲度假')"><span class="emoji">🏖️</span>三亚四天三晚</button>
        <button class="scene-card" onclick="travelScene('云南（昆明-大理-丽江）',7,6000,'自然风光+人文')"><span class="emoji">🏔️</span>云南七日深度游</button>
        <button class="scene-card" onclick="travelScene('上海',2,2000,'都市探索+美食')"><span class="emoji">🏙️</span>上海周末两日游</button>
    </div>
    <div class="content">
        <div class="result-container" id="travelResult">
            <div class="empty-state">
                <div class="icon">🗺️</div>
                <p style="font-weight:600;color:var(--text2)">开始规划您的旅程</p>
                <p>填写目的地、天数、预算和风格偏好，<br>AI 将为您生成个性化旅行方案。</p>
            </div>
        </div>
    </div>
</div>

<script>
marked.setOptions({ breaks: true, gfm: true });

// ====== Tab Switching ======
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => {
        t.classList.toggle('active', (tab==='cs'?0:1)===i);
    });
    document.getElementById('panel-cs').style.display = tab==='cs' ? 'flex' : 'none';
    document.getElementById('panel-travel').style.display = tab==='travel' ? 'flex' : 'none';
    if (tab==='cs') document.getElementById('csInput').focus();
}

// ====== API ======
const CS_SYSTEM = "你是「智选商城」的智能客服助手「小智」。回复要求：1）专业亲切，使用适当emoji；2）回复末尾用> 引用格式附带AI处理过程：📋 知识库命中、🎯 意图识别（置信度%）、😊 情绪分析；3）售后政策：7天无理由退货、15天质量问题换新、30天保修维修；4）遇到投诉主动安抚并判断是否转人工。";

async function callAPIStream(messages, temp=0.7, maxTok=2048, onChunk) {
    try {
        const resp = await fetch('/api', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages, temperature: temp, max_tokens: maxTok, stream: true })
        });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let full = '';
        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value, { stream: true });
            full += chunk;
            onChunk(chunk, full);
        }
        return full;
    } catch(e) {
        // Fallback: non-streaming call
        try {
            const resp = await fetch('/api', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages, temperature: temp, max_tokens: maxTok })
            });
            const data = await resp.json();
            const content = data.content || '服务暂不可用';
            onChunk(content, content);
            return content;
        } catch(e2) {
            const err = '网络异常，请稍后重试。';
            onChunk(err, err);
            return err;
        }
    }
}

// ====== Chat ======
let csHistory = [];

function csScene(_, msg) {
    document.getElementById('csInput').value = msg;
    csSend();
}

async function csSend() {
    const input = document.getElementById('csInput');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    input.focus();

    appendBubble('user', msg);
    csHistory.push({ role: 'user', content: msg });

    const bubble = appendBubble('assistant', '<div class="typing"><span></span><span></span><span></span></div>');
    const msgs = [{ role: 'system', content: CS_SYSTEM }, ...csHistory];
    
    let streamed = '';
    const reply = await callAPIStream(msgs, 0.7, 2048, (chunk, full) => {
        streamed = full;
        // 实时渲染：对已收到的完整 markdown 块做渲染
        bubble.innerHTML = marked.parse(streamed) + '<span class="typing-cursor" style="display:inline-block;width:2px;height:1em;background:var(--accent);margin-left:1px;animation:blink 1s infinite;vertical-align:text-bottom;"></span>';
        document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
    });

    bubble.innerHTML = marked.parse(reply);
    csHistory.push({ role: 'assistant', content: reply });
}

function appendBubble(role, html) {
    const container = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'chat-bubble ' + role;
    div.innerHTML = html;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
}

function csClear() {
    csHistory = [];
    const container = document.getElementById('chatMessages');
    container.innerHTML = '<div class="chat-bubble assistant">你好！我是智选商城智能客服小智 👋<br>有什么可以帮您的？</div>';
    document.getElementById('csInput').focus();
}

// ====== Travel ======
function travelScene(dest, days, budget, style) {
    document.getElementById('tvDest').value = dest;
    document.getElementById('tvDays').value = days;
    document.getElementById('tvBudget').value = budget;
    document.getElementById('tvStyle').value = style;
    travelPlan();
}

async function travelPlan() {
    const dest = document.getElementById('tvDest').value.trim();
    const days = document.getElementById('tvDays').value;
    const budget = document.getElementById('tvBudget').value;
    const style = document.getElementById('tvStyle').value;
    const add = document.getElementById('tvAdd').value.trim();
    if (!dest) return;

    const btn = document.getElementById('planBtn');
    const result = document.getElementById('travelResult');
    
    btn.disabled = true;
    btn.textContent = '⏳ 规划中…';
    result.innerHTML = '<div class="empty-state"><div style="font-size:2rem;margin-bottom:8px">✈️</div><p>正在生成个性化旅行方案…</p></div>';

    const prompt = `请为我规划一趟旅行：

📍 目的地：${dest}
📅 天数：${days}天
💰 预算：${budget}元/人
🎯 风格：${style}
📝 补充：${add || '无'}

请按以下 Markdown 格式详细输出：

## 🗺️ 旅行概览
（2-3句话概括亮点，列出最佳季节、核心体验）

## 📋 每日行程
（每天包含上午/下午/晚上，具体到景点名称、交通方式、时间安排、餐饮推荐）

## 💰 预算明细
（用表格，分交通/住宿/餐饮/门票/其他，合计不能超预算）

## 💡 实用贴士
